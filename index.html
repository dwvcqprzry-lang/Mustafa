<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKOON</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            padding: 20px;
            width: 90%;
            max-width: 400px;
        }

        .step {
            display: none; /* نخفي كل الخطوات بالبداية */
            animation: fadeIn 0.5s ease-in-out;
        }

        .step.active {
            display: block; /* نظهر الخطوة النشطة فقط */
        }

        h1 { font-size: 3rem; margin-bottom: 10px; color: #fff; }
        p { font-size: 1.2rem; margin-bottom: 25px; line-height: 1.6; }

        button {
            background-color: #fff;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #ddd;
            transform: scale(1.05);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: none;
            outline: none;
            text-align: center;
            font-size: 1rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- الخطوة 1 -->
    <div class="step active" id="step1">
        <h1>SKOON</h1>
        <p>هلا بيك بموقع مُـصطفى 🤍</p>
        <button onclick="nextStep(2)">ابدأ</button>
    </div>

    <!-- الخطوة 2 -->
    <div class="step" id="step2">
        <p>(هذا الموقع ما منطي لواحد 😒. شلون دخلت ؟ 🤔)</p>
        <button onclick="nextStep(3)">مصطفى انطاك الموقع ؟</button>
    </div>

    <!-- الخطوة 3 -->
    <div class="step" id="step3">
        <p>(انـي ما انطيتة بس لحسوني😉 <br> تريد تثبت انتَ حسين ؟ 😏)</p>
        <button onclick="nextStep(4)">اييـ انـي حسين</button>
    </div>

    <!-- الخطوة 4 -->
    <div class="step" id="step4">
        <p>اثبتلي 🫰🏽🖕🏽</p>
        <button onclick="nextStep(5)">اثبتلي</button>
    </div>

    <!-- الخطوة 5: السؤال والإجابة -->
    <div class="step" id="step5">
        <p>( منو اكثر شخص احبة 🌚)</p>
        <input type="text" id="answerInput" placeholder="اكتب إجابتك هنا...">
        <button onclick="submitAnswer()">ارسال</button>
    </div>

    <!-- الخطوة 6 -->
    <div class="step" id="step6">
        <p>🤍🤍🤍 انتَ اكثر شخص احبة 🫰🏽🖕🏽</p>
        <button onclick="nextStep(7)">النهاية</button>
    </div>

    <!-- الخطوة 7: الأخيرة -->
    <div class="step" id="step7">
        <p>احبك كلش هواي 🤍 <br> ولا تدخل على اي موقع يدزة الك شخص لان كل جهازك يصير يمة 😉</p>
    </div>
</div>

<script>
    function nextStep(stepNumber) {
        // إخفاء كل الخطوات
        document.querySelectorAll('.step').forEach(step => {
            step.classList.remove('active');
        });
        // إظهار الخطوة المطلوبة
        document.getElementById('step' + stepNumber).classList.add('active');
    }

    function submitAnswer() {
        const answer = document.getElementById('answerInput').value;
        if (answer.trim() === "") {
            alert("اكتب شي أولاً!");
            return;
        }

        // هنا إذا تريد الإجابة توصلك صدك، لازم تربطها بـ API
        console.log("إجابة حسين هي: " + answer);
        
        // الانتقال للرسالة الرومانسية
        nextStep(6);
    }
</script>

</body>
</html>
