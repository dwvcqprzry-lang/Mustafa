body {
  font-family: 'Tajawal', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0a0a0f;
  overflow: hidden;
  position: relative;
}

/* Stars background */
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  animation: twinkle var(--d) infinite ease-in-out;
  opacity: 0;
}
@keyframes twinkle {
  0%,100% { opacity: 0; transform: scale(0.8); }
  50%      { opacity: var(--o); transform: scale(1.2); }
}

/* Glow orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
}
.orb1 { width: 350px; height: 350px; background: rgba(120,60,200,0.25); top: -100px; right: -100px; animation: orbMove1 8s ease-in-out infinite; }
.orb2 { width: 300px; height: 300px; background: rgba(200,60,120,0.2);  bottom: -80px; left: -80px;  animation: orbMove2 10s ease-in-out infinite; }
@keyframes orbMove1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,30px)} }
@keyframes orbMove2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,-30px)} }

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 32px;
  padding: 50px 36px;
  max-width: 460px;
  width: 92%;
  text-align: center;
  position: relative;
  z-index: 1;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
}

/* Screens */
.screen { display: none; animation: fadeUp 0.5s ease forwards; }
.screen.active { display: block; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* SKOON title */
.brand {
  font-size: 3.5rem;
  font-weight: 900;
  letter-spacing: 8px;
  background: linear-gradient(135deg, #b06aff, #ff6ab0, #6ab0ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
  animation: glow 3s ease-in-out infinite;
}
@keyframes glow {
  0%,100% { filter: drop-shadow(0 0 8px rgba(180,100,255,0.6)); }
  50%      { filter: drop-shadow(0 0 20px rgba(255,100,180,0.8)); }
}

.welcome {
  font-size: 1.2rem;
  color: rgba(255,255,255,0.75);
  margin-bottom: 36px;
  line-height: 1.7;
}

.msg {
  font-size: 1.25rem;
  font-weight: 700;
  color: #fff;
  line-height: 1.8;
  margin-bottom: 28px;
}

.msg-sub {
  font-size: 1.05rem;
  color: rgba(255,255,255,0.7);
  line-height: 1.7;
  margin-bottom: 28px;
}

/* Buttons */
.btn {
  display: inline-block;
  padding: 14px 36px;
  border-radius: 50px;
  border: none;
  font-family: 'Tajawal', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  margin: 6px;
}
.btn:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,0.3); }
.btn:active { transform: translateY(0); }

.btn-primary {
  background: linear-gradient(135deg, #b06aff, #ff6ab0);
  color: #fff;
}
.btn-secondary {
  background: rgba(255,255,255,0.1);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.25);
}
.btn-secondary:hover { background: rgba(255,255,255,0.2); }

.btn-danger {
  background: linear-gradient(135deg, #ff4e7a, #c0392b);
  color: #fff;
}

.btn-end {
  background: linear-gradient(135deg, #6ab0ff, #b06aff);
  color: #fff;
  margin-top: 10px;
}

/* Input */
.input-wrap {
  margin: 20px 0;
}
.input-wrap input {
  width: 100%;
  padding: 14px 20px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08);
  color: #fff;
  font-family: 'Tajawal', sans-serif;
  font-size: 1rem;
  outline: none;
  text-align: right;
  transition: border 0.3s;
}
.input-wrap input::placeholder { color: rgba(255,255,255,0.35); }
.input-wrap input:focus { border-color: rgba(176,106,255,0.7); }

/* Emoji big */
.big-emoji {
  font-size: 3rem;
  display: block;
  margin-bottom: 14px;
  animation: bounce 2s infinite;
}
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}

/* Confetti */
.confetti-piece {
  position: fixed;
  border-radius: 2px;
  pointer-events: none;
  z-index: 999;
  animation: confettiFall 3s ease-in forwards;
}
@keyframes confettiFall {
  0%   { opacity:1; transform: translateY(-20px) rotate(0deg); }
  100% { opacity:0; transform: translateY(100vh) rotate(720deg); }
}

  </div>

  <script>
    // Generate stars
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 3 + 1;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}%;
        left:${Math.random()*100}%;
        --d:${2+Math.random()*4}s;
        --o:${0.3+Math.random()*0.7};
        animation-delay:${Math.random()*4}s;
      `;
      starsEl.appendChild(s);
    }

    function go(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
      if (screenId === 's6') launchConfetti();
      if (screenId === 's7') launchConfetti(['#b06aff','#ff6ab0','#6ab0ff','#fff']);
    }

    function submitAnswer() {
      const val = document.getElementById('answerInput').value.trim();
      if (!val) {
        document.getElementById('answerInput').style.borderColor = '#ff4e7a';
        setTimeout(() => document.getElementById('answerInput').style.borderColor = '', 1000);
        return;
      }
      go('s6');
    }

    function launchConfetti(colors = ['#b06aff','#ff6ab0','#ffd700','#fff','#6ab0ff']) {
      for (let i = 0; i < 70; i++) {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.cssText = `
          left:${Math.random()*100}vw;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          animation-delay:${Math.random()*1.5}s;
          animation-duration:${2+Math.random()*2}s;
          width:${6+Math.random()*10}px;
          height:${6+Math.random()*10}px;
        `;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4500);
      }
    }
  </script>
